# ntfy server configuration (for self-hosted setup)
# See https://docs.ntfy.sh/config/ for all options
base-url: https://ntfy.example.com
upstream-base-url: https://ntfy.sh
cache-file: /var/cache/ntfy/cache.db
# SECURITY: deny by default, then grant per-topic access:
#   ntfy user add --role=admin ADMIN_USER
#   ntfy access ADMIN_USER YOUR_TOPIC rw
auth-default-access: deny
behind-proxy: true
